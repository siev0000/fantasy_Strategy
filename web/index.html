<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Strategy Prototype (Vue)</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="/socket.io/socket.io.js" defer></script>
  <script src="/vendor/vue/dist/vue.global.prod.js" defer></script>
  <script src="./js/realistic-island.js" defer></script>
  <script src="./js/map.js" defer></script>
  <script src="./js/components/base-modal.js" defer></script>
  <script src="./js/components/app-header.js" defer></script>
  <script src="./js/components/map-generator-panel.js" defer></script>
  <script src="./js/components/menu-panel.js" defer></script>
  <script src="./js/components/room-modal.js" defer></script>
  <script src="./js/components/battle-modal.js" defer></script>
  <script src="./js/components/simulator-modal.js" defer></script>
  <script src="./js/app-vue.js" defer></script>
</head>
<body>
  <div id="app" class="app">
    <app-header :active-room-id="activeRoomId" @open-modal="openModal" />

    <map-generator-panel />

    <menu-panel @open-modal="openModal" />

    <room-modal
      :show="showRoomModal"
      :socket-ready="socketReady"
      :active-room-id="activeRoomId"
      :room-id-input="roomIdInput"
      :player-name-input="playerNameInput"
      :session-status-text="sessionStatusText"
      :session-status-class="sessionStatusClass"
      :players-label="playersLabel"
      @close="closeModal('room')"
      @update:room-id-input="roomIdInput = $event"
      @update:player-name-input="playerNameInput = $event"
      @create-room="createRoom"
      @join-room="joinRoom"
      @leave-room="leaveRoom"
    />

    <battle-modal
      :show="showBattleModal"
      :current-state="currentState"
      :action-disabled="actionDisabled"
      :next-disabled="nextDisabled"
      :reset-disabled="resetDisabled"
      @close="closeModal('battle')"
      @action="runAction"
    />

    <simulator-modal
      :show="showSimModal"
      :sim="sim"
      :sim-result="simResult"
      @close="closeModal('sim')"
      @run-turn="runSimulatorTurn"
    />
  </div>
</body>
</html>
